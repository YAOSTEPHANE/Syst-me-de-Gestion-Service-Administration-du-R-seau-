name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mongodb://127.0.0.1:27017/lonaci_ci
      JWT_SECRET: "01234567890123456789012345678901"
      SKIP_PROD_ENV_CONSOLE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run check:api-routes
      - run: npx prisma generate
      - run: npm run build
