name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mongodb://127.0.0.1:27017/lonaci_ci
      JWT_SECRET: "01234567890123456789012345678901"
      SKIP_PROD_ENV_CONSOLE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run check:api-routes
      - run: npm run check:api-zod
      - run: npx prisma generate
  build:
    runs-on: ubuntu-latest
    needs: quality
    env:
      DATABASE_URL: mongodb://127.0.0.1:27017/lonaci_ci
      JWT_SECRET: "01234567890123456789012345678901"
      SKIP_PROD_ENV_CONSOLE: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upload next build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ github.sha }}
          path: |
            .next
          if-no-files-found: error
