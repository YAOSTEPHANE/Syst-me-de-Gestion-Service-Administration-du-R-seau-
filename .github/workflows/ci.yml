name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mongodb://127.0.0.1:27017/lonaci_ci
      JWT_SECRET: "01234567890123456789012345678901"
      SKIP_PROD_ENV_CONSOLE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run check:api-routes
      - run: npm run check:api-zod
      - run: npm run audit:deps
      - run: npx prisma generate

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/nextjs
            p/owasp-top-ten

  playwright:
    runs-on: ubuntu-latest
    needs: [quality]
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      CI: "true"
      DATABASE_URL: mongodb://127.0.0.1:27017/lonaci_ci
      JWT_SECRET: "01234567890123456789012345678901"
      ADMIN_EMAIL: admin@lonaci.ci
      ADMIN_PASSWORD: Admin@123456
      E2E_ADMIN_EMAIL: admin@lonaci.ci
      E2E_ADMIN_PASSWORD: Admin@123456
      SEED_DEMO_RESET: "true"
      SEED_DEMO_COUNT: "30"
      SKIP_PROD_ENV_CONSOLE: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      TZ: Africa/Abidjan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Seed déterministe e2e
        run: npm run seed:test
      - name: Installer Chromium
        run: npx playwright install --with-deps chromium
      - name: Smoke Playwright Chromium
        run: npm run test:e2e:chromium
      - name: Publier les diagnostics Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: [quality, semgrep, playwright]
    env:
      DATABASE_URL: mongodb://127.0.0.1:27017/lonaci_ci
      JWT_SECRET: "01234567890123456789012345678901"
      SKIP_PROD_ENV_CONSOLE: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upload next build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ github.sha }}
          path: |
            .next
          if-no-files-found: error
